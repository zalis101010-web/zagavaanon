<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Anonymous Inbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="admin-wrap" id="adminWrap">

    <!-- Форма логина -->
    <div class="login-card" id="loginCard">
      <h1>Admin Access</h1>
      <p class="subtitle">Введи пароль, чтобы увидеть входящие сообщения.</p>

      <form id="loginForm">
        <input
          type="password"
          id="passwordInput"
          placeholder="Пароль"
          autocomplete="current-password"
          required
        >
        <div class="login-error" id="loginError"></div>
        <button type="submit">Войти</button>
      </form>
    </div>

    <!-- Список сообщений (показывается после успешного логина) -->
    <div class="inbox" id="inboxView" style="display:none;">
      <div class="inbox-header">
        <div>
          <h1>Inbox</h1>
          <div class="count" id="msgCount">0 сообщений</div>
        </div>
        <button id="logoutBtn">Выйти</button>
      </div>

      <div id="messagesList"></div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
