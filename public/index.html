<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АНОНИМНЫЕ СООБЩЕНИЯ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="splash">
    <div class="splash-particles" id="particles"></div>
    <div class="splash-title">Zagava Anon</div>
    <div class="splash-sub">Напиши мне анонимное сообщение!</div>
    <button id="startBtn">Войти</button>
  </div>

  <main class="wrap" id="main">
    <div class="card">
      <div class="banner">
        <div class="banner-grid"></div>
        <div class="banner-overlay"></div>
        <div class="secure-badge">
          <span class="pulse-dot"></span>
          Работает
        </div>
      </div>

      <div class="avatar-wrap">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="5" width="18" height="14" rx="2.5"></rect>
            <path d="M3 7l7.2 5.4a3 3 0 0 0 3.6 0L21 7"></path>
          </svg>
        </div>
      </div>

      <div class="card-body">
        <div class="eyebrow">
          <span class="dot"></span>
          <span>Полная Анонимность</span>
        </div>

        <h1>Анонимное Место
        </h1>
        <p class="subtitle">Напиши что угодно и я тебе отвечу в скором времени.</p>

        <form id="sendForm">
          <textarea
            id="messageInput"
            placeholder="Начни писать..."
            maxlength="2000"
            rows="6"
            required
          ></textarea>

          <div class="form-footer">
            <span id="charCount">0 / 2000</span>
            <button type="submit" id="sendBtn">
              <span class="btn-label">Отправить</span>
              <span class="btn-spinner" aria-hidden="true"></span>
            </button>
          </div>
        </form>

        <div id="statusBox" class="status-box"></div>

        <hr class="divider">

        <div class="now-playing" id="nowPlaying">
          <div class="np-header">
            <div class="eq-bars">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span>Сейчас играет</span>
            <button class="np-toggle" id="npToggle" title="Пауза/Play">❚❚</button>
          </div>
          <div class="np-track">
            <span class="np-track-inner" id="npTrack">
              ♫ добавь свой трек в public/music.mp3&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;♫ добавь свой трек в public/music.mp3&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;
            </span>
          </div>
          <div class="np-progress">
            <span id="npCurrent">0:00</span>
            <div class="np-bar-wrap"><div class="np-bar-fill" id="npFill" style="width:0%"></div></div>
            <span id="npTotal">0:00</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
